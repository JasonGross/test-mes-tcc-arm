name: mes tcc arm bugs
on:
  push:
  pull_request:
  workflow_dispatch:

# Four independent jobs (fail-fast: false). Three rebuild the shared
# from-source toolchain (bootstrap.sh) and run a MesCC compile of the whole
# tcc.c translation unit under qemu-arm -- a multi-hour job on a GitHub
# runner, hence the long timeout. bug1-parse fails in the parser and is the
# quickest; bug2-token carries a full ~TU compile up to the hex2 link; fixed
# carries all three fixes through to a tcc-mes that compiles+runs a hello
# (exit 76 = 55+21, spurious-pass-proof -- see README). bug3-cmp is a fast,
# self-contained encoding A/B that needs no bootstrap at all. The fixed job
# does not claim self-hosting or >4-arg calls (a further MesCC fix, tracked
# upstream); see the README claim boundary.
jobs:
  repro:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { mode: parse, name: "bug1-parse  (arm-gen.c avregs = {0})" }
          - { mode: token, name: "bug2-token  (TOK___memmove under EABI)" }
          - { mode: fixed, name: "fixed       (fix1+2+3 -> tcc-mes runs hello, exit 76)" }
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user (AArch32 execution)
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-user-static
      - name: Bootstrap (stage0 hex0 seed -> armv7l mes-m2 -> nyacc -> fetch tcc)
        run: ./bootstrap.sh
      - name: "Reproduce: ${{ matrix.mode }}"
        run: ./repro.sh ${{ matrix.mode }}

  bug3-cmp:
    name: "bug3-cmp    (arm-gen.c CMP SBZ encoding)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user + arm cross tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-user-static gcc-arm-linux-gnueabihf
      - name: "A/B the CMP-SBZ encoding (stock 0xe3511000 SIGILL vs fix3 0xe3510000 runs)"
        run: ./bug3.sh
